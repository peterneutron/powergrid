name: powergrid-ci

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      GOWORK: off
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Homebrew build tools
        run: |
          brew install xcodegen protobuf swift-protobuf grpc-swift swiftlint

      - name: Install Go build tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.3.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify required build tools
        run: |
          set -euo pipefail
          command -v go
          command -v xcodegen
          command -v protoc
          command -v protoc-gen-go
          command -v protoc-gen-go-grpc
          command -v protoc-gen-swift
          command -v protoc-gen-grpc-swift-2 || command -v protoc-gen-grpc-swift
          command -v golangci-lint
          command -v swiftlint
          xcodegen --version
          swiftlint version
          protoc --version

      - name: Verify
        run: make verify
