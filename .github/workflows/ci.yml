name: powergrid-ci

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  XCODEGEN_VERSION: 2.45.3
  SWIFTLINT_VERSION: 0.63.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      GOWORK: off
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install Homebrew build tools
        run: |
          brew install protobuf swift-protobuf

      - name: Install pinned XcodeGen and SwiftLint
        run: |
          set -euo pipefail
          tool_bin="$RUNNER_TEMP/pinned-bin"
          mkdir -p "$tool_bin"

          curl -fsSL -o "$RUNNER_TEMP/xcodegen.zip" "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP/xcodegen"
          install -m 0755 "$RUNNER_TEMP/xcodegen/xcodegen/bin/xcodegen" "$tool_bin/xcodegen"

          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -q "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/swiftlint"
          install -m 0755 "$RUNNER_TEMP/swiftlint/swiftlint" "$tool_bin/swiftlint"

          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Install Go build tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.3.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify required build tools
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version
          command -v go
          command -v xcodegen
          command -v protoc
          command -v protoc-gen-go
          command -v protoc-gen-go-grpc
          command -v protoc-gen-swift
          command -v python3
          command -v golangci-lint
          command -v swiftlint
          xcodegen --version
          swiftlint version
          protoc --version
          plugin_path="$(bash ./scripts/ensure-grpc-swift-plugin.sh)"
          test -x "$plugin_path"
          "$plugin_path" --version

      - name: Verify
        run: make verify
