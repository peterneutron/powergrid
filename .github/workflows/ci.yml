name: powergrid-ci

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  XCODEGEN_VERSION: 2.45.3
  SWIFTLINT_VERSION: 0.63.2
  GRPC_SWIFT_PROTOBUF_PLUGIN_VERSION: 2.1.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      GOWORK: off
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Homebrew build tools
        run: |
          brew install protobuf swift-protobuf

      - name: Install pinned XcodeGen and SwiftLint
        run: |
          set -euo pipefail
          tool_bin="$RUNNER_TEMP/pinned-bin"
          mkdir -p "$tool_bin"

          curl -fsSL -o "$RUNNER_TEMP/xcodegen.zip" "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -q "$RUNNER_TEMP/xcodegen.zip" -d "$RUNNER_TEMP/xcodegen"
          install -m 0755 "$RUNNER_TEMP/xcodegen/xcodegen/bin/xcodegen" "$tool_bin/xcodegen"

          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -q "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/swiftlint"
          install -m 0755 "$RUNNER_TEMP/swiftlint/swiftlint" "$tool_bin/swiftlint"

          echo "$tool_bin" >> "$GITHUB_PATH"

      - name: Install pinned gRPC Swift protoc plugin
        run: |
          set -euo pipefail
          tool_bin="$RUNNER_TEMP/pinned-bin"
          plugin_dir="$RUNNER_TEMP/grpc-swift-protobuf"
          git clone --depth 1 --branch "${GRPC_SWIFT_PROTOBUF_PLUGIN_VERSION}" https://github.com/grpc/grpc-swift-protobuf.git "$plugin_dir"
          swift build --package-path "$plugin_dir" -c release --product protoc-gen-grpc-swift-2
          install -m 0755 "$plugin_dir/.build/release/protoc-gen-grpc-swift-2" "$tool_bin/protoc-gen-grpc-swift-2"
          ln -sf "$tool_bin/protoc-gen-grpc-swift-2" "$tool_bin/protoc-gen-grpc-swift"

      - name: Install Go build tools
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.3.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify required build tools
        run: |
          set -euo pipefail
          command -v go
          command -v xcodegen
          command -v protoc
          command -v protoc-gen-go
          command -v protoc-gen-go-grpc
          command -v protoc-gen-swift
          command -v protoc-gen-grpc-swift-2 || command -v protoc-gen-grpc-swift
          command -v golangci-lint
          command -v swiftlint
          xcodegen --version
          swiftlint version
          protoc --version
          protoc-gen-grpc-swift-2 --version

      - name: Verify
        run: make verify
