name: powergrid-ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install xcodegen
        run: |
          VERSION=2.44.1
          curl -fsSL -o /tmp/xcodegen.zip "https://github.com/yonaskolb/XcodeGen/releases/download/${VERSION}/xcodegen.zip"
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen
          XCODEGEN_BIN="$(find /tmp/xcodegen -type f -name xcodegen | head -n1)"
          chmod +x "$XCODEGEN_BIN"
          sudo mv "$XCODEGEN_BIN" /usr/local/bin/xcodegen
          xcodegen --version

      - name: Install proto toolchain
        run: |
          brew install protobuf swift-protobuf grpc-swift
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Verify required build tools
        run: |
          set -euo pipefail
          command -v go
          command -v xcodegen
          command -v protoc
          command -v protoc-gen-go
          command -v protoc-gen-go-grpc
          command -v protoc-gen-swift
          command -v protoc-gen-grpc-swift-2 || command -v protoc-gen-grpc-swift
          protoc --version

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          install-mode: goinstall
          version: v2.3.1

      - name: Proto check
        run: make proto-check

      - name: XcodeGen check
        run: make xcodegen-check

      - name: Install SwiftLint
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint version
          else
            brew install swiftlint
            swiftlint version
          fi

      - name: SwiftLint
        run: make swiftlint

      - name: Swift tests
        run: |
          xcodebuild test \
            -project cmd/powergrid-app/PowerGrid/PowerGrid.xcodeproj \
            -scheme PowerGrid \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:PowerGridTests
