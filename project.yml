name: PowerGrid

options:
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

packages:
  grpc-swift-nio-transport:
    url: https://github.com/grpc/grpc-swift-nio-transport.git
    from: 2.0.0
  grpc-swift-2:
    url: https://github.com/grpc/grpc-swift-2.git
    from: 2.1.0
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: 2.85.0
  grpc-swift-protobuf:
    url: https://github.com/grpc/grpc-swift-protobuf.git
    from: 2.0.0
  swift-protobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.30.0

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: 15.5
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    SWIFT_VERSION: 5.0
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  PowerGrid:
    type: application
    platform: macOS
    deploymentTarget: "15.5"
    sources:
      - path: cmd/powergrid-app/PowerGrid/PowerGrid
        excludes:
          - Info.plist
    resources:
      - path: cmd/powergrid-app/PowerGrid/AppIcon.icon
    configFiles:
      Debug: cmd/powergrid-app/PowerGrid/Config/Base.xcconfig
      Release: cmd/powergrid-app/PowerGrid/Config/Base.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neutronstar.PowerGrid
        PRODUCT_NAME: "$(TARGET_NAME)"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: PowerGrid/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: PowerGrid
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSAppleEventsUsageDescription: PowerGrid needs your permission to run a script that will install its required helper daemon.
        CODE_SIGN_ENTITLEMENTS: PowerGrid/PowerGrid.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        REGISTER_APP_GROUPS: YES
        DEAD_CODE_STRIPPING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
    preBuildScripts:
      - name: Generate Daemon
        shell: /bin/zsh
        script: |
          "${SRCROOT}/../../../scripts/build-go.sh"
        basedOnDependencyAnalysis: false
        showEnvVars: false
    copyFiles:
      - destination: resources
        files:
          - path: build-go/powergrid-daemon.buildid
          - path: install/com.neutronstar.powergrid.daemon.plist
          - path: build-go/powergrid-helper
            codeSignOnCopy: true
          - path: build-go/powergrid-daemon
            codeSignOnCopy: true
    dependencies:
      - package: grpc-swift-nio-transport
        product: GRPCNIOTransportHTTP2
      - package: grpc-swift-2
        product: GRPCCore
      - package: grpc-swift-2
        product: GRPCInProcessTransport
      - package: swift-nio
        product: NIOCore
      - package: grpc-swift-protobuf
        product: GRPCProtobuf
      - package: swift-protobuf
        product: SwiftProtobuf

  PowerGridTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.5"
    sources:
      - path: cmd/powergrid-app/PowerGrid/PowerGridTests
    dependencies:
      - target: PowerGrid
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neutronstar.PowerGridTests
        PRODUCT_NAME: "$(TARGET_NAME)"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PowerGrid.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PowerGrid"

  PowerGridUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "15.5"
    sources:
      - path: cmd/powergrid-app/PowerGrid/PowerGridUITests
    dependencies:
      - target: PowerGrid
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neutronstar.PowerGridUITests
        PRODUCT_NAME: "$(TARGET_NAME)"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: PowerGrid

schemes:
  PowerGrid:
    shared: true
    build:
      targets:
        PowerGrid: all
    test:
      targets:
        - name: PowerGridTests
